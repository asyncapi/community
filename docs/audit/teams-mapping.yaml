# Map GitHub team slugs (as in CODEOWNERS: @asyncapi/team-name) to member logins.
#
# Keys MUST match entries in `teams[]` inside docs/audit/raw-data.json.
# After CODEOWNERS change, run: npm run audit:fetch
#
# Authoritative roster: GitHub org → Teams → team → Members, e.g.
#   https://github.com/orgs/asyncapi/teams
#
# Format: each team key is the full slug `asyncapi/<team_slug>` (same string as in raw-data).
#         `members` is a list of GitHub usernames (no @).

teams:
  # asyncapi/code_of_conduct — CoC team members (GitHub logins).
  "asyncapi/code_of_conduct":
    members:
      - AceTheCreator
      - thulieblack
      - Mayaleeeee
