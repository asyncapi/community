# Default rule set — edit or copy to experiment.
version: 1
window_months: 12

bots:
  deny_reviewers:
    - asyncapi-bot-eve
  deny_pr_authors:
    - asyncapi-bot

aggregation:
  mode: profile
  profile: balanced
  k_of_n:
    enabled: false
    k: 2
    n: 5

rules:
  - id: commits_in_window
    kind: commit_activity
    enabled: true
  - id: merged_prs
    kind: merged_pr_author
    enabled: true
  - id: pr_reviews
    kind: pr_review
    enabled: true
  - id: issue_threads
    kind: issue_interaction
    enabled: false
  - id: org_wide
    kind: org_wide_activity
    enabled: false
  - id: heartbeat
    kind: last_interaction_any
    enabled: false
